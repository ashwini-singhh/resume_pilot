name: Deploy Backend to Cloud Run

on:
  push:
    branches: [ "main" ]
    # Only run when backend-related files change
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: resume-backend

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    
    # Required for Workload Identity Federation (Optional, but good practice)
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: 'Authenticate with Google Cloud'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: 'Set up Cloud SDK'
        uses: google-github-actions/setup-gcloud@v2

      - name: 'Push to Cloud Run'
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --source ./backend \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --set-env-vars="DATABASE_URL=${{ secrets.DATABASE_URL }},API_KEY=${{ secrets.API_KEY }},OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }},OPENROUTER_BASE_URL=${{ secrets.OPENROUTER_BASE_URL }},MODEL_NAME=${{ secrets.MODEL_NAME }}" 
            --quiet
